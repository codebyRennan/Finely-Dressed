<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finely Dressed | Entrar</title>
    <meta name="description" content="Acesse sua conta no Finely Dressed.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-blob top-left"></div>
    <div class="glow-blob bottom-right"></div>

    <header class="header">
        <nav class="navbar">
            <div class="logo">
                <a href="Finely-Dressed.html" class="logo-link">
                    <span class="gradient-text">Finely Dressed</span>
                </a>
            </div>
            <ul class="nav-links">
                <li>
                    <button class="theme-toggle" id="theme-toggle" aria-label="Alternar Tema" title="Alternar Modo Escuro/Claro">
                        <span class="icon-moon">🌙</span>
                        <span class="icon-sun">☀️</span>
                    </button>
                </li>
            </ul>
        </nav>
    </header>

    <main class="main-content login-content">
        <div class="glass-card login-card">
            <h1 class="login-title">Bem-vindo de volta</h1>
            <p class="login-subtitle">Entre com sua conta para continuar montando seus looks.</p>

            <div id="login-error" class="login-error hidden" role="alert">
                <span id="login-error-msg"></span>
            </div>

            <form id="login-form" novalidate>
                <div class="input-group">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required>
                </div>

                <div class="input-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                </div>


                <button type="submit" class="btn-primary login-btn">
                    <span>Entrar</span>
                </button>
            </form>

            <p class="login-register-text">
                Ainda não tem uma conta?
                <a href="#" class="login-link">Criar conta</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Finely Dressed. Criado para o seu estilo.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
